services:
  mysql:
    image: mysql:8.0
    container_name: sonet_course_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: course_platform
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3307:3306"
    volumes:
      - sonet_course_mysql_data:/var/lib/mysql
    command: >-
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: sonet_course_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - sonet_course_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  sonet_course_mysql_data:
  sonet_course_redis_data:
